        --color-indigo-100: #352B1E;
        --color-indigo-200: #5F4F30;
        --color-indigo-300: #8C7540;
        --color-indigo-400: #B39950;
        --color-indigo-500: #D4AF37;
        --color-indigo-600: #D4AF37;
        --color-indigo-700: #B5952F;
        --color-indigo-800: #937822;
        --color-indigo-900: #6E5915;
        --color-indigo-950: #3B300A;

        --color-amber-50: #1A1712;
        --color-amber-100: #1A1712;
        --color-amber-200: #3B300A;
        --color-amber-300: #6E5915;
        --color-amber-400: #937822;
        --color-amber-500: #D4AF37;
        --color-amber-600: #D4AF37;
        --color-amber-700: #B5952F;
        --color-amber-800: #B39950;
        --color-amber-900: #FEF3C7;
        --color-amber-950: #FFFBEB;
        
        --font-main: 'Plus Jakarta Sans', sans-serif;
      }

      body {
        font-family: var(--font-main);
        background-color: var(--color-bg);
        color: var(--color-text-main);
        -webkit-font-smoothing: antialiased;
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      .btn-primary {
        background-color: var(--color-primary);
        color: #FFFFFF !important;
        font-weight: 700;
        padding: 0.75rem 1.5rem;
        border-radius: 1rem;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        box-shadow: 0 4px 14px 0 rgba(225, 29, 72, 0.3);
      }

      .btn-primary:hover {
        background-color: var(--color-primary-hover);
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(225, 29, 72, 0.4);
      }

      .btn-secondary {
        background-color: var(--color-surface-card);
        color: var(--color-text-main);
        font-weight: 700;
        padding: 0.75rem 1.5rem;
        border-radius: 1rem;
        border: 1px solid var(--border-color);
        transition: all 0.2s ease;
      }

      .btn-secondary:hover {
        background-color: var(--border-color);
      }

      .card-star {
        background: var(--color-surface-card);
        border-radius: 1.5rem;
        overflow: hidden;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid var(--border-color);
      }

      .card-star:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15), 0 10px 10px -5px rgba(0, 0, 0, 0.08);
      }

      .input-main {
        background: var(--color-surface-card);
        border: 1px solid var(--border-color);
        border-radius: 1rem;
        padding: 0.875rem 1rem;
        width: 100%;
        color: var(--color-text-main);
        transition: all 0.2s ease;
      }

      .input-main:focus {
        outline: none;
        border-color: var(--color-primary);
        box-shadow: 0 0 0 2px rgba(225, 29, 72, 0.15);
      }

      /* Badge e tag */
      .badge-category {
        background: rgba(225, 29, 72, 0.1);
        color: var(--color-primary);
        font-size: 0.75rem;
        font-weight: 700;
        padding: 0.25rem 0.75rem;
        border-radius: 2rem;
        text-transform: uppercase;
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: var(--color-bg); }
      ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--color-text-secondary); }
